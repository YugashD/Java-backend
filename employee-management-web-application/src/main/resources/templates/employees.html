<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Employees</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-primary px-4 mb-4">
    <span class="navbar-brand">Employee Management</span>
    <div>
        <a href="/employee/add" class="btn btn-light btn-sm me-2">+ Add Employee</a>
        <a href="/logout" class="btn btn-outline-light btn-sm">Logout</a>
    </div>
</nav>

<div class="container">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h5 class="mb-0">All Employees</h5>
        <div>
            <button id="refresh" class="btn btn-outline-primary btn-sm me-2">Refresh</button>
            <button id="deleteAll" class="btn btn-outline-danger btn-sm">Delete All</button>
        </div>
    </div>

    <div id="status" class="alert" style="display:none"></div>

    <div class="card shadow-sm">
        <div class="table-responsive">
            <table id="employeesTable" class="table table-hover table-striped mb-0">
                <thead class="table-dark">
                <tr>
                    <th>ID</th><th>Name</th><th>Age</th>
                    <th>Designation</th><th>Salary</th><th>Actions</th>
                </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>
</div>

<!-- Raise Salary Modal -->
<div class="modal fade" tabindex="-1" id="raiseModal">
    <div class="modal-dialog modal-sm">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Raise Salary</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <p id="modalInfo" class="text-muted small mb-3"></p>
                <label class="form-label">Increase by (%)</label>
                <input id="modalPercentage" type="number" class="form-control" min="1" placeholder="e.g. 10" />
            </div>
            <div class="modal-footer">
                <button type="button" id="modalConfirm" class="btn btn-success">Apply Raise</button>
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/frontend.js"></script>
</body>
</html>
