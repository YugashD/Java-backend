spring.application.name=EmployeeManagement

server.port=8080
spring.datasource.url=jdbc:mysql://localhost:3306/employeedb
spring.datasource.username=root
spring.datasource.password=admin
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Simple auth user for beginner project
app.user.name=user
app.user.password=password

# Use Spring Boot's default basic auth (auto-config). These will be used by Spring Security
spring.security.user.name=${app.user.name}
spring.security.user.password=${app.user.password}

