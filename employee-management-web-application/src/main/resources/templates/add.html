<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add Employee</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<nav class="navbar navbar-dark bg-primary px-4 mb-4">
    <span class="navbar-brand">Employee Management</span>
    <a href="/employees" class="btn btn-outline-light btn-sm">← Back to List</a>
</nav>
<div class="container" style="max-width:480px">
    <div class="card shadow-sm">
        <div class="card-header"><h5 class="mb-0">Add Employee</h5></div>
        <div class="card-body">
            <div id="formError" class="alert alert-danger" style="display:none"></div>
            <form id="addForm">
                <div class="mb-3">
                    <label class="form-label">Name</label>
                    <input type="text" name="name" class="form-control" required />
                </div>
                <div class="mb-3">
                    <label class="form-label">Age</label>
                    <input type="number" name="age" class="form-control" min="18" max="60" required />
                </div>
                <div class="mb-3">
                    <label class="form-label">Designation</label>
                    <select name="designation" class="form-select">
                        <option value="PROGRAMMER">Programmer (₹20,000)</option>
                        <option value="MANAGER">Manager (₹25,000)</option>
                        <option value="TESTER">Tester (₹15,000)</option>
                    </select>
                    <div class="form-text">Salary is assigned automatically based on designation.</div>
                </div>
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary">Add Employee</button>
                    <a href="/employees" class="btn btn-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/frontend.js"></script>
</body>
</html>
